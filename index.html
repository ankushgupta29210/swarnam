<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swarnam | Luxury Store</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}
body{background:#0b0b0b;color:#fff}
header{display:flex;justify-content:space-between;align-items:center;padding:20px 50px;background:#000;position:sticky;top:0;z-index:10}
.logo{display:flex;align-items:center;gap:10px}
.logo img{height:35px}
.logo h1{color:#d4af37;letter-spacing:2px}
nav a{color:#ccc;margin-left:20px;text-decoration:none}
nav a:hover{color:#d4af37}
.cart-btn{background:#d4af37;color:#000;padding:8px 15px;border-radius:8px;cursor:pointer}
.hero{height:80vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,1)),url('product/img2.jpeg') center/cover}
.hero h2{font-size:3rem}
.products{padding:50px;display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:25px}
.card{background:#141414;border-radius:15px;overflow:hidden;transition:.3s}
.card:hover{transform:translateY(-8px)}
.card img{width:100%;height:260px;object-fit:cover}
.card-content{padding:15px}
.price{color:#d4af37;margin-top:8px}
.btn{margin-top:10px;display:inline-block;padding:8px 15px;background:#d4af37;color:#000;border-radius:8px;cursor:pointer}

/* --- MODAL CSS FIXES START HERE --- */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);display:none;justify-content:center;align-items:center;z-index:20; padding: 20px;}
.modal-content{background:#111;padding:20px;border-radius:15px;width:100%;max-width:500px; max-height:90vh; overflow-y:auto;}
/* Constrained the image height so it never pushes the button off screen */
.modal img{width:100%; max-height:45vh; object-fit:cover; border-radius:10px}
/* --- MODAL CSS FIXES END HERE --- */

.close{float:right;cursor:pointer;font-size:1.2rem;color:#fff;}
.cart-item{display:flex;justify-content:space-between;margin:10px 0}
.checkout{background:#d4af37;color:#000;padding:10px;border-radius:10px;margin-top:10px;text-align:center;cursor:pointer;font-weight:600;}
</style>
</head>
<body>
<header>
<div class="logo">
<img src="product/logo.png" alt="Swarnam Logo">
<h1>SWARNAM</h1>
</div>
<nav>
<a href="#">Home</a>
<a href="#products">Collection</a>
<span class="cart-btn" onclick="openCart()">Cart (<span id="cart-count">0</span>)</span>
</nav>
</header>
<section class="hero">
<h2>Luxury Measured in Time</h2>
<p>Limited Edition Premium Craft</p>
</section>
<section class="products" id="products"></section>

<div class="modal" id="productModal">
<div class="modal-content">
<span class="close" onclick="closeModal()">X</span>
<img id="modal-img">
<h3 id="modal-title" style="margin-top: 15px;"></h3>
<p id="modal-desc" style="color: #bbb; font-size: 0.9rem; margin-top: 8px; line-height: 1.5;"></p>
<div class="price" id="modal-price" style="font-size: 1.2rem; font-weight: 600; margin: 15px 0;"></div>
<div class="btn" style="width: 100%; text-align: center; font-weight: 600;" onclick="addToCart()">Add to Cart</div>
</div>
</div>

<div class="modal" id="cartModal">
<div class="modal-content">
<span class="close" onclick="closeCart()">X</span>
<h3 style="margin-bottom: 15px; color: #d4af37;">Your Cart</h3>
<div id="cart-items"></div>
<div class="checkout" onclick="checkout()">Checkout</div>
</div>
</div>

<script>
let selectedProduct=null;
let cart=JSON.parse(localStorage.getItem('cart'))||[];

// 1. Array of premium descriptions for the products
const premiumDescriptions = [
    "Crafted with hand-selected premium materials for a timeless aesthetic that only gets better with age.",
    "A statement piece blending modern utility with uncompromising luxury. Perfect for the daily commute or global travel.",
    "Precision-engineered with signature gold hardware, intricate detailing, and a meticulous finish.",
    "The ultimate companion for the modern journey, offering spacious interiors without compromising on sleek design.",
    "An exclusive limited-edition design, reflecting the true essence of Swarnam craftsmanship."
];

function renderProducts(){
    const container=document.getElementById('products');
    for(let i=1;i<=30;i++){
        const price=(Math.floor(Math.random()*200)+150);
        const card=document.createElement('div');
        card.className='card';
        card.innerHTML=`
        <img src="product/img${i}.jpeg" loading="lazy" alt="Swarnam Item ${i}">
        <div class="card-content">
        <h3>Swarnam Item ${i}</h3>
        <div class="price">$${price}</div>
        <div class="btn" onclick="openProduct(${i},${price})">View</div>
        </div>`;
        container.appendChild(card);
    }
}

function openProduct(i,price){
    // 2. Cycle through the descriptions based on the product number
    const descriptionText = premiumDescriptions[i % premiumDescriptions.length];
    
    selectedProduct={id:i,price,desc:descriptionText};
    
    document.getElementById('modal-img').src=`product/img${i}.jpeg`;
    document.getElementById('modal-title').innerText=`Swarnam Item ${i}`;
    document.getElementById('modal-price').innerText=`$${price}`;
    
    // 3. Inject the description into the modal
    document.getElementById('modal-desc').innerText=descriptionText;
    
    document.getElementById('productModal').style.display='flex';
}

function closeModal(){document.getElementById('productModal').style.display='none'}

function addToCart(){
    cart.push(selectedProduct);
    localStorage.setItem('cart',JSON.stringify(cart));
    updateCart();
    closeModal();
}

function updateCart(){
    document.getElementById('cart-count').innerText=cart.length;
}

function openCart(){
    document.getElementById('cartModal').style.display='flex';
    const container=document.getElementById('cart-items');
    container.innerHTML='';
    
    let total = 0;
    
    if(cart.length === 0) {
        container.innerHTML = '<p style="color: #888; text-align: center; padding: 20px 0;">Your cart is empty.</p>';
        return;
    }

    cart.forEach((item,index)=>{
        total += item.price; 
        container.innerHTML+=`<div class='cart-item'>Item ${item.id} - $${item.price} <span style='cursor:pointer;' onclick='removeItem(${index})'>❌</span></div>`;
    });
    
    container.innerHTML += `<hr style="margin: 15px 0; border-color: #333;">
                            <div class='cart-item' style='font-weight: 600; color: #d4af37; font-size: 1.1rem;'>
                                <span>Total:</span> <span>$${total}</span>
                            </div>`;
}

function closeCart(){document.getElementById('cartModal').style.display='none'}

function removeItem(i){
    cart.splice(i,1);
    localStorage.setItem('cart',JSON.stringify(cart));
    openCart();
    updateCart();
}

function checkout(){alert('Payment integration next step 🚀');}

window.onclick = function(event) {
    const prodModal = document.getElementById('productModal');
    const cartModal = document.getElementById('cartModal');
    if (event.target === prodModal) {
        closeModal();
    }
    if (event.target === cartModal) {
        closeCart();
    }
}

renderProducts();
updateCart();
</script>
</body>
</html>
