<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swarnam | Ultra Luxury</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}
body{background:#050505;color:#fff}

/* HEADER */
header{display:flex;justify-content:space-between;align-items:center;padding:20px 60px;background:rgba(0,0,0,0.8);backdrop-filter:blur(10px);position:sticky;top:0;z-index:10}
.logo{display:flex;align-items:center;gap:10px}
.logo img{height:35px}
.logo h1{color:#d4af37;letter-spacing:3px;font-weight:600}
nav a{color:#aaa;margin-left:25px;text-decoration:none;font-size:14px}
nav a:hover{color:#fff}
.cart-btn{background:linear-gradient(45deg,#d4af37,#f5e6a8);color:#000;padding:8px 15px;border-radius:20px;cursor:pointer;font-weight:600}

/* HERO */
.hero{height:90vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,1)),url('product/img2.jpeg') center/cover}
.hero h2{font-size:4rem;letter-spacing:3px;font-weight:600}
.hero p{color:#aaa;margin-top:10px}

/* PRODUCTS */
.products{padding:80px;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:35px}
.card{background:#111;border-radius:20px;overflow:hidden;transition:.4s;border:1px solid rgba(255,255,255,0.05)}
.card:hover{transform:translateY(-10px) scale(1.02);box-shadow:0 20px 50px rgba(212,175,55,0.2)}
.card img{width:100%;height:300px;object-fit:cover}
.card-content{padding:18px}
.card-content h3{font-weight:500}
.price{color:#d4af37;margin-top:10px;font-weight:600}
.btn{margin-top:12px;display:inline-block;padding:10px 18px;background:linear-gradient(45deg,#d4af37,#f5e6a8);color:#000;border-radius:20px;cursor:pointer;font-size:14px;font-weight:600}

/* MODAL */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);display:none;justify-content:center;align-items:center;z-index:20;padding:20px}
.modal-content{background:#0f0f0f;padding:25px;border-radius:20px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;border:1px solid rgba(255,255,255,0.05)}
.modal img{width:100%;max-height:45vh;object-fit:cover;border-radius:12px;transition:.3s}
.modal img:hover{transform:scale(1.05)}
.close{float:right;cursor:pointer;font-size:1.2rem}
.desc{color:#aaa;margin-top:10px;line-height:1.6}
.badge{margin-top:10px;background:#d4af37;color:#000;padding:5px 10px;border-radius:6px;font-size:12px;display:inline-block}
.specs{margin-top:10px;color:#bbb;font-size:14px}
.cert{margin-top:15px;border:1px solid #d4af37;padding:12px;border-radius:10px;color:#d4af37;font-size:13px;text-align:center}

/* CART */
.cart-item{display:flex;justify-content:space-between;margin:10px 0;border-bottom:1px solid #222;padding-bottom:8px}
.checkout{background:linear-gradient(45deg,#d4af37,#f5e6a8);color:#000;padding:12px;border-radius:12px;margin-top:15px;text-align:center;cursor:pointer;font-weight:600}

/* ========================================= */
/* MOBILE RESPONSIVENESS FIXES               */
/* ========================================= */
@media (max-width: 768px) {
    /* Stack the header and center items */
    header {
        flex-direction: column;
        padding: 15px 20px;
        gap: 15px;
    }
    .logo h1 {
        font-size: 1.5rem; /* Slightly smaller logo text */
    }
    nav {
        display: flex;
        gap: 15px;
        align-items: center;
    }
    nav a {
        margin-left: 0; /* Remove the wide left margin */
    }
    
    /* Shrink the massive hero text */
    .hero h2 {
        font-size: 2.5rem;
        padding: 0 15px;
    }
    
    /* Give the products breathing room and force 1 column */
    .products {
        padding: 40px 20px;
        grid-template-columns: 1fr;
    }
    
    /* Tighten up the modal so it fits on small phone screens */
    .modal {
        padding: 10px;
    }
    .modal-content {
        padding: 15px;
    }
    .modal img {
        max-height: 40vh;
    }
}
</style>
</head>
<body>

<header>
<div class="logo">
<img src="product/logo.png">
<h1>SWARNAM</h1>
</div>
<nav>
<a href="#">Home</a>
<a href="#products">Collection</a>
<span class="cart-btn" onclick="openCart()">Cart (<span id="cart-count">0</span>)</span>
</nav>
</header>

<section class="hero">
<h2>Timeless Luxury</h2>
<p>Crafted for the Elite</p>
</section>

<section class="products" id="products"></section>

<div class="modal" id="productModal">
<div class="modal-content">
<span class="close" onclick="closeModal()">✕</span>
<img id="modal-img">
<h3 id="modal-title" style="margin-top:15px"></h3>
<div class="price" id="modal-price"></div>
<div id="modal-badge"></div>
<p class="desc" id="modal-desc"></p>
<div class="specs" id="modal-specs"></div>
<div class="cert" id="modal-cert"></div>
<div class="btn" style="width:100%;text-align:center" onclick="addToCart()">Add to Cart</div>
</div>
</div>

<div class="modal" id="cartModal">
<div class="modal-content">
<span class="close" onclick="closeCart()">✕</span>
<h3 style="color:#d4af37">Your Cart</h3>
<div id="cart-items"></div>
<div class="checkout" onclick="checkout()">Checkout</div>
</div>
</div>

<script>
let selectedProduct=null;
let cart=JSON.parse(localStorage.getItem('cart'))||[];

const names=["Noir Signature","Aurum Wallet","Eclipse Carry","Imperial Set","Obsidian Edition"];

function renderProducts(){
const container=document.getElementById('products');
for(let i=1;i<=30;i++){
const price=(Math.floor(Math.random()*200)+200);
const card=document.createElement('div');
card.className='card';
card.innerHTML=`
<img src="product/img${i}.jpeg" loading="lazy">
<div class="card-content">
<h3>${names[i%names.length]}</h3>
<div class="price">$${price}</div>
<div class="btn" onclick="openProduct(${i},${price})">View</div>
</div>`;
container.appendChild(card);
}
}

function openProduct(i,price){
const edition=`${Math.floor(Math.random()*10)+1}/20`;
selectedProduct={id:i,price};

document.getElementById('modal-img').src=`product/img${i}.jpeg`;
document.getElementById('modal-title').innerText=names[i%names.length];
document.getElementById('modal-price').innerText=`$${price}`;
document.getElementById('modal-desc').innerText="Crafted with precision using premium materials for a timeless luxury experience.";
document.getElementById('modal-badge').innerHTML=`<span class='badge'>Only ${edition} pieces</span>`;
document.getElementById('modal-specs').innerText="Material: Premium Leather • Handcrafted • Gold Hardware";
document.getElementById('modal-cert').innerText="Certified Luxury Product • Swarnam Authenticity Verified";

document.getElementById('productModal').style.display='flex';
}

function closeModal(){document.getElementById('productModal').style.display='none'}

function addToCart(){
cart.push(selectedProduct);
localStorage.setItem('cart',JSON.stringify(cart));
updateCart();
closeModal();
}

function updateCart(){document.getElementById('cart-count').innerText=cart.length}

function openCart(){
document.getElementById('cartModal').style.display='flex';
const container=document.getElementById('cart-items');
container.innerHTML='';
let total=0;
cart.forEach((item,index)=>{
total+=item.price;
// Added an onclick to the X so users can actually remove items visually in the cart!
container.innerHTML+=`<div class='cart-item'>${names[item.id%names.length]} <div><span>$${item.price}</span> <span style="cursor:pointer; margin-left:10px;" onclick="removeItem(${index})">❌</span></div></div>`;
});
container.innerHTML+=`<div class='cart-item' style='color:#d4af37;font-weight:600; border-top: 1px solid #333; padding-top: 10px;'><span>Total</span><span>$${total}</span></div>`;
}

function closeCart(){document.getElementById('cartModal').style.display='none'}

// Added the removeItem function back in so the X button works
function removeItem(i){
    cart.splice(i,1);
    localStorage.setItem('cart',JSON.stringify(cart));
    openCart();
    updateCart();
}

function checkout(){alert('Next: Stripe Integration 🚀')}

// Close modals when clicking the dark background
window.onclick = function(event) {
    const prodModal = document.getElementById('productModal');
    const cartModal = document.getElementById('cartModal');
    if (event.target === prodModal) closeModal();
    if (event.target === cartModal) closeCart();
}

renderProducts();
updateCart();
</script>

</body>
</html>
